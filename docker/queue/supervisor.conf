[supervisord]
nodaemon=true

[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
; Use the app's configured QUEUE_CONNECTION (.env) instead of hardcoding a
; connection, so the worker always consumes the same queue jobs are dispatched
; to. Hardcoding "redis" silently drops jobs when QUEUE_CONNECTION=database.
command=php /app/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
user=goat
numprocs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes = 0
